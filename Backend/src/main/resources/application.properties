spring.application.name=Backend
server.port=8080

# WebSocket buffer sizes
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Allowed frontend origins (dev + preview + docker)
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173,http://localhost,"https://tfi-simulacion-bice.vercel.app"

# Logging – muestra INFO y DEBUG del motor de simulación
logging.level.com.example.backend.service.SimulationEngine=DEBUG
